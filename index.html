<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Broker™ — Coming Soon</title>
  <link rel="icon" type="image/png" sizes="32x32" href="green-rings.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B2918;
      color: #fff;
      position: relative;
      overflow: hidden;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    body::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(61,163,102,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: clamp(12px, 2.5vh, 24px);
      width: min(100%, 560px);
    }
    .logo-badge {
      width: clamp(52px, 7vh, 64px);
      height: clamp(52px, 7vh, 64px);
      margin-bottom: clamp(14px, 2.8vh, 24px);
    }
    .logo-text {
      font-size: clamp(1.35rem, 3.2vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: clamp(20px, 4vh, 32px);
    }
    .logo-tm {
      font-size: 0.55em;
      vertical-align: super;
      font-weight: 400;
      margin-left: 1px;
    }
    .coming-soon {
      font-size: clamp(0.68rem, 1.6vh, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5FBF80;
      margin-bottom: clamp(10px, 1.8vh, 16px);
    }
    h1 {
      font-size: clamp(1.12rem, 2.8vw, 1.4rem);
      font-weight: 600;
      line-height: 1.42;
      color: rgba(255,255,255,0.85);
      max-width: 440px;
      margin: 0 auto clamp(20px, 4vh, 32px);
      text-wrap: balance;
    }
    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #5FBF80;
      text-decoration: none;
      font-size: clamp(0.84rem, 1.9vh, 0.88rem);
      font-weight: 600;
      padding: 11px 24px;
      border: 1px solid rgba(95,191,128,0.3);
      border-radius: 6px;
      transition: all 0.25s;
    }
    .contact-link:hover {
      background: rgba(95,191,128,0.08);
      border-color: rgba(95,191,128,0.5);
    }
    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(16px, env(safe-area-inset-bottom));
      padding: 0 16px;
      text-align: center;
      font-size: clamp(0.68rem, 1.5vh, 0.75rem);
      color: rgba(255,255,255,0.3);
      line-height: 1.35;
    }
    .footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
    }
    .footer a:hover { color: rgba(255,255,255,0.6); }

    @media (max-height: 760px) {
      body::before {
        top: -260px;
        width: 640px;
        height: 640px;
      }
      .container {
        transform: translateY(-18px);
      }
      .footer {
        bottom: max(10px, env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 480px) {
      .container {
        padding-left: 8px;
        padding-right: 8px;
      }
      h1 {
        max-width: 320px;
      }
      .footer {
        font-size: 0.68rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="green-rings.png" alt="Secure Broker" class="logo-badge">
    <div class="logo-text">Secure Broker<span class="logo-tm">™</span></div>
    <div class="coming-soon">Coming Soon</div>
    <h1>Independent certification for brokers in alternative finance.</h1>
    <a href="mailto:info@aquamark.io" class="contact-link">
      Get in Touch
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>
  <div class="footer">
    &copy; 2026 Secure Broker™ &middot; Administered by <a href="https://aquamark.io" target="_blank">Aquamark</a>
  </div>
</body>
</html>
