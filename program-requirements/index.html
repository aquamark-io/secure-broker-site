<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Requirements — Secure Broker™</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/green-rings.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/green-rings.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/green-rings.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #11352A;
      --forest-mid: #1A4A34;
      --green-accent: #3DA366;
      --green-accent-soft: #5FBF80;
      --white: #FFFFFF;
      --text-primary: #0B2918;
      --text-secondary: #3D6B4E;
      --border: #C5DFD0;
      --border-light: #DEF0E5;
      --meadow: #EFF7F2;
      --font: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      color: var(--text-primary);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-inner {
      max-width: 1240px;
      width: 100%;
      display: flex;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--forest);
      gap: 12px;
    }
    .logo-badge { width: 30px; height: 30px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em; }
    .logo-tm { font-size: 0.55em; vertical-align: super; font-weight: 400; margin-left: 1px; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }
    .content {
      text-align: center;
      width: 100%;
      max-width: 760px;
    }
    .title {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--forest);
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-secondary);
      max-width: 560px;
      margin: 0 auto 34px;
    }
    .requirement-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      justify-content: center;
    }
    .option-card {
      background: var(--meadow);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 30px 28px 28px;
      text-align: left;
      transition: all 0.25s;
    }
    .option-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(11,41,24,0.06);
    }
    .option-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green-accent);
      margin-bottom: 14px;
    }
    .option-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--forest);
      margin-bottom: 10px;
    }
    .option-card p {
      font-size: 0.94rem;
      line-height: 1.65;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 24px;
      min-width: 180px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      background: var(--forest);
      color: var(--white);
    }
    .btn:hover {
      background: var(--forest-mid);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(11,41,24,0.12);
    }

    @media (max-width: 640px) {
      html, body { min-height: 100%; height: auto; overflow: auto; }
      .main { padding: 48px 20px; align-items: flex-start; }
      .requirement-options { grid-template-columns: 1fr; gap: 14px; }
      .title { font-size: 1.5rem; }
      .subtitle { font-size: 0.94rem; margin-bottom: 28px; }
      .option-card { padding: 26px 22px 24px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <img class="logo-badge" src="/green-rings.png" alt="Secure Broker">
        <div class="logo-text">Secure Broker<span class="logo-tm">™</span></div>
      </a>
    </div>
  </nav>

  <main class="main">
    <div class="content">
      <h1 class="title">Program Requirements</h1>
      <p class="subtitle">Practical and lightweight framework</p>

      <div class="requirement-options">
        <div class="option-card">
          <span class="option-label">Solo path</span>
          <h2>Solo Operators</h2>
          <p>For independent brokers that operate alone.</p>
          <a href="/broker_standards_v2.pdf" target="_blank" rel="noopener noreferrer" class="btn">View Requirements</a>
        </div>

        <div class="option-card">
          <span class="option-label">Team path</span>
          <h2>Brokerage Teams</h2>
          <p>For brokerages with employees, contractors, and shared systems.</p>
          <a href="/broker_standards_v2.pdf" target="_blank" rel="noopener noreferrer" class="btn">View Requirements</a>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
