<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Program Requirements — Secure Broker™</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/green-rings.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/green-rings.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/green-rings.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #11352A;
      --forest-mid: #1A4A34;
      --green-accent: #3DA366;
      --green-accent-soft: #5FBF80;
      --white: #FFFFFF;
      --text-primary: #0B2918;
      --text-secondary: #3D6B4E;
      --border: #C5DFD0;
      --border-light: #DEF0E5;
      --meadow: #EFF7F2;
      --font: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      color: var(--text-primary);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .nav-inner {
      max-width: 1240px;
      width: 100%;
      display: flex;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: var(--forest);
      gap: 12px;
    }
    .logo-badge { width: 30px; height: 30px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em; }
    .logo-tm { font-size: 0.55em; vertical-align: super; font-weight: 400; margin-left: 1px; }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }
    .content { text-align: center; }
    .title {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--forest);
      margin-bottom: 36px;
    }
    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 32px;
      min-width: 200px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
      background: var(--forest);
      color: var(--white);
    }
    .btn:hover {
      background: var(--forest-mid);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(11,41,24,0.12);
    }

    @media (max-width: 480px) {
      .buttons { flex-direction: column; gap: 10px; }
      .title { font-size: 1.5rem; margin-bottom: 28px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <img class="logo-badge" src="/green-rings.png" alt="Secure Broker">
        <div class="logo-text">Secure Broker<span class="logo-tm">™</span></div>
      </a>
    </div>
  </nav>

  <main class="main">
    <div class="content">
      <h1 class="title">Program Requirements</h1>
      <div class="buttons">
        <a href="/broker_standards_v2.pdf" target="_blank" rel="noopener noreferrer" class="btn">Solo Operators</a>
        <a href="/broker_standards_v2.pdf" target="_blank" rel="noopener noreferrer" class="btn">Teams</a>
      </div>
    </div>
  </main>

</body>
</html>
