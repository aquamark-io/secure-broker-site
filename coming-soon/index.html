<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directory — Secure Broker™</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../green-rings.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../green-rings.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../green-rings.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --utility-height: 34px;
      --forest: #11352A;
      --forest-mid: #1A4A34;
      --meadow: #EFF7F2;
      --white: #FFFFFF;
      --green-accent: #3DA366;
      --green-accent-soft: #5FBF80;
      --text-primary: #0B2918;
      --text-secondary: #3D6B4E;
      --text-muted: #6A9B7C;
      --border: #C5DFD0;
      --border-light: #DEF0E5;
      --moss: #6BAF7E;
      --mint: #A3D4B0;
      --font-display: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ===== UTILITY BAR ===== */
    .utility-bar {
      background: linear-gradient(90deg, #0D2A1C 0%, #123820 52%, #174528 100%);
      color: var(--mint);
      font-size: 0.8rem;
      height: var(--utility-height);
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-shrink: 0;
    }

    /* ===== NAV ===== */
    .main-nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(11,41,24,0.04);
      flex-shrink: 0;
    }
    .main-nav .container {
      display: flex; justify-content: space-between; align-items: center; height: 68px;
      max-width: 1120px; margin: 0 auto; padding: 0 24px;
    }
    .logo {
      display: flex; align-items: center; text-decoration: none; color: var(--forest); gap: 12px;
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em;
    }
    .logo-tm { font-size: 0.55em; vertical-align: super; font-weight: 400; margin-left: 1px; }
    .logo-badge-lg { width: 44px; height: 44px; flex: 0 0 auto; }
    .nav-links {
      display: flex; align-items: center; gap: 4px; list-style: none;
    }
    .nav-links a {
      text-decoration: none; color: var(--text-primary);
      font-size: 0.88rem; font-weight: 500; padding: 8px 14px;
      border-radius: 6px; transition: all 0.2s;
    }
    .nav-links a:hover { background: var(--meadow); }
    .nav-links .btn-member {
      background: var(--forest); color: var(--white); font-weight: 600; margin-left: 6px;
    }
    .nav-links .btn-member:hover { background: var(--forest-mid); }
    .mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .mobile-toggle span { display: block; width: 22px; height: 2px; background: var(--forest); margin: 5px 0; }

    /* ===== MAIN CONTENT ===== */
    .coming-soon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--meadow);
      padding: 24px;
    }
    .coming-soon-inner {
      text-align: center;
      max-width: 460px;
    }
    .coming-soon-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green-accent);
      margin-bottom: 16px;
    }
    .coming-soon-inner h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--forest);
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .coming-soon-inner p {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .coming-soon-inner a.contact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--white);
      background: var(--green-accent);
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .coming-soon-inner a.contact-link:hover {
      background: var(--forest);
    }
    .coming-soon-inner a.contact-link svg {
      flex-shrink: 0;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .nav-links { display: none; }
      .mobile-toggle { display: block; }
      .logo-badge-lg { width: 38px; height: 38px; }
    }
    @media (max-width: 600px) {
      .utility-bar { font-size: 0.72rem; height: 30px; }
      .main-nav .container { height: 56px; }
      .logo-badge-lg { width: 32px; height: 32px; }
      .logo-text { font-size: 1.15rem; }
      .coming-soon-inner h1 { font-size: 1.45rem; }
      .coming-soon-inner p { font-size: 0.9rem; }
    }
    @media (max-width: 380px) {
      .coming-soon-inner h1 { font-size: 1.3rem; }
    }

    /* Mobile nav menu */
    .mobile-menu {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--white); z-index: 1000;
      flex-direction: column; padding: 24px;
    }
    .mobile-menu.active { display: flex; }
    .mobile-menu-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;
    }
    .mobile-menu-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.5rem; color: var(--forest); padding: 8px;
    }
    .mobile-menu a {
      display: block; padding: 14px 0;
      font-size: 1.05rem; font-weight: 500; color: var(--forest);
      text-decoration: none; border-bottom: 1px solid var(--border-light);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu .btn-member-mobile {
      display: block; margin-top: 24px; padding: 14px;
      background: var(--forest); color: var(--white);
      text-align: center; border-radius: 8px; font-weight: 600;
      text-decoration: none; font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="utility-bar">
    <span>Prove your data practices. Stand out to funders.</span>
  </div>

  <nav class="main-nav">
    <div class="container">
      <a href="/" class="logo" aria-label="Secure Broker Home">
        <img class="logo-badge-lg" src="../green-rings.png" alt="Secure Broker">
        <div class="logo-text">Secure Broker<span class="logo-tm">™</span></div>
      </a>
      <ul class="nav-links">
        <li><a href="/#about">About</a></li>
        <li><a href="/coming-soon">Directory</a></li>
        <li><a href="/#leadership">Leadership</a></li>
        <li><a href="/#press">Press</a></li>
        <li><a href="/#membership">Membership</a></li>
        <li><a href="https://securebroker.org/contact/" class="btn-member">Apply Now</a></li>
      </ul>
      <button class="mobile-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="coming-soon">
    <div class="coming-soon-inner">
      <div class="coming-soon-label">Secure Broker</div>
      <h1>Check Back Soon</h1>
      <p>We're almost ready to share.</p>
      <a href="/contact" class="contact-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Ask a Question
      </a>
    </div>
  </main>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
      <a href="/" class="logo" aria-label="Secure Broker Home">
        <img src="../green-rings.png" alt="Secure Broker" style="width:30px;height:30px;">
        <div class="logo-text">Secure Broker<span class="logo-tm">™</span></div>
      </a>
      <button class="mobile-menu-close" id="mobileMenuClose" aria-label="Close menu">&#10005;</button>
    </div>
    <a href="/#about" onclick="closeMobileMenu()">About</a>
    <a href="/directory" onclick="closeMobileMenu()">Directory</a>
    <a href="/#leadership" onclick="closeMobileMenu()">Leadership</a>
    <a href="/#press" onclick="closeMobileMenu()">Press</a>
    <a href="/#membership" onclick="closeMobileMenu()">Membership</a>
    <a href="https://securebroker.org/contact/" class="btn-member-mobile">Apply Now</a>
  </div>

  <script>
    const toggle = document.querySelector('.mobile-toggle');
    const menu = document.getElementById('mobileMenu');
    const closeBtn = document.getElementById('mobileMenuClose');
    function closeMobileMenu() { menu.classList.remove('active'); document.body.style.overflow = ''; }
    toggle.addEventListener('click', () => { menu.classList.add('active'); document.body.style.overflow = 'hidden'; });
    closeBtn.addEventListener('click', closeMobileMenu);
  </script>

</body>
</html>
